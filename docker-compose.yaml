services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: final-assignment-postgres
    environment:
      POSTGRES_DB: callcenter
      POSTGRES_USER: callcenter
      POSTGRES_PASSWORD: callcenter
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/sql/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U callcenter -d callcenter"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:

