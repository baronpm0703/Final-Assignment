domain:
  name: call_center_analytics
  description: Call center analytics over operational call data.

knowledge:
  root_path: knowledge

prompts:
  system_prompt_path: prompts/data_agent_system.md

schema:
  allowed_functions:
    - avg
    - cast
    - coalesce
    - count
    - date_trunc
    - extract
    - max
    - min
    - nullif
    - round
    - sum
    - timestamp_trunc
    - current_date
    - now
    - case
    - if
  allowed_tables:
    distribution_call:
      columns:
        - call_id
        - calling_number
        - call_type
        - queue
        - agent_id
        - call_start
        - call_end
        - waiting_queue_dur
        - ring_dur
        - talk_dur
        - wrapup_dur
        - hold_dur
        - call_dur
        - agent_disconnect
      enums:
        call_type: ["Inbound", "Outbound"]
        queue: ["1", "2", "3", "4", "5"]
    call_log:
      columns:
        - request_id
        - call_id
        - request_code
        - create_date
        - create_agent
        - detail
      enums:
        request_code: ["YC_TL", "YC_DC", "YC_PAY", "YC_INFO"]
    request_code:
      columns:
        - code
        - name
        - description
    agent:
      columns:
        - agent_id
        - agent_name
        - agent_tl
      enums:
        agent_tl: ["TL_A", "TL_B", "TL_C", "TL_D"]
    abandoned_call:
      columns:
        - abd_id
        - call_id
        - abandoned_time
        - abandoned_type
        - waiting_dur
        - ring_dur
        - call_dur
        - agent_id
      enums:
        abandoned_type: ["Agent", "Busy", "InQueue"]

router:
  intent_utterances_path: config/intent_utterances.json
  bm25_confidence_threshold: 0.8
  llm_fallback_enabled: true

agent:
  max_react_iters: 30
  max_repeated_tool_calls: 30

response:
  clarification_options:
    - Abandon/SLA
    - Yêu cầu khách hàng
    - Năng suất agent
    - Thời gian talk
